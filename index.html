<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* Fundo com estrelas */
.stars {
    width: 100%;
    height: 100%;
    position: absolute;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: move 60s linear infinite;
}

@keyframes move {
    from {background-position: 0 0;}
    to {background-position: 1000px 1000px;}
}

/* Container central */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    font-size: 40px;
    margin-bottom: 30px;
}

/* Caixa da key */
.key-box {
    padding: 20px 40px;
    border-radius: 15px;
    border: 2px solid #3b82f6;
    background: #0f172a;
    font-size: 20px;
    margin-bottom: 20px;
}

/* Botão */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
}

.status {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
    <h1>YOUR KEY</h1>

    <div class="key-box" id="keyBox">Carregando...</div>

    <button onclick="copyKey()">COPY KEY</button>

    <div class="status" id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("Key");

const keyBox = document.getElementById("keyBox");
const status = document.getElementById("status");

if (!key) {
    keyBox.innerText = "SEM KEY";
    status.innerText = "❌ Nenhuma key encontrada!";
} else {
    keyBox.innerText = key;

    // 🔗 conecta com sua API (troca pelo seu IP)
    fetch("http://SEU_IP:5000/check-key?key=" + key)
    .then(res => res.json())
    .then(data => {
        if (data.status === "ok") {
            status.innerText = "✅ Key válida";
        } else if (data.status === "used") {
            status.innerText = "⚠️ Key já usada";
        } else {
            status.innerText = "❌ Key inválida";
        }
    })
    .catch(() => {
        status.innerText = "❌ Erro ao conectar";
    });
}

// copiar key
function copyKey() {
    navigator.clipboard.writeText(key);
    alert("Key copiada!");
}
</script>

</body>
</html>
